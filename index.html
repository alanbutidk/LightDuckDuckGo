<!DOCTYPE html>
<html>
<head>
<link rel="stylesheet" href="styles.css">
<title>DuckDuckGo Search Browser</title>
</head>
<body>

    <div id="tab-bar">
        <button class="nav-btn" onclick="showSearch()">+</button>
        <div id="tabs-list" style="display: flex;"></div>
    </div>

    <div id="dashboard">
        <div class="glass-panel">
            <div style="font-size: 10px; opacity: 0.5;">ENGINE_v2.0</div>
            <h1>LightDuckDuckGo</h1>
            <input type="text" class="search-box" placeholder="Search here..." id="input">
            <div id="results"></div>
        </div>
    </div>

    <div id="views-container"></div>
    <script>
        const { ipcRenderer } = require('electron');
        let tabCount = 0;
        let activeTabId = null;

        // 1. Create the Master URL Bar (This stays fire and editable)
        function createPersistentBar() {
            if (document.getElementById('nav-shell')) return;
            const nav = document.createElement('div');
            nav.id = 'nav-shell';
            nav.style.cssText = "display:flex; align-items:center; background:rgba(10,10,10,0.95); padding:10px 20px; border-bottom:1px solid rgba(255,255,255,0.1); backdrop-filter:blur(20px); position:fixed; top:50px; left:0; right:0; z-index:9999;";
            
            nav.innerHTML = `
                <button class="nav-btn" onclick="goBack()">‹</button>
                <button class="nav-btn" onclick="goForward()">›</button>
                <input type="text" id="main-url-bar" placeholder="Enter URL or Search..." 
                    style="flex:1; background:rgba(255,255,255,0.05); border:1px solid rgba(255,255,255,0.1); color:#fff; font-family:'Roboto Mono'; font-size:13px; padding:10px 15px; border-radius:10px; outline:none; margin:0 15px; pointer-events: auto !important;">
                <div id="main-spinner" class="loading-spinner" style="width:14px; height:14px; border:2px solid #333; border-top-color:#fff; border-radius:50%; animation:spin 0.8s linear infinite; display:none;"></div>
            `;
            document.body.appendChild(nav);

            // Listener for the Top URL Bar
            document.getElementById('main-url-bar').addEventListener('keypress', (e) => {
                if (e.key === 'Enter') navigateTo(e.target.value);
            });
        }
        createPersistentBar();

        // 2. DASHBOARD SEARCH LOGIC (Restoring your results list)
        async function handleDashboardSearch(e) {
            if (e.key === 'Enter') {
                const query = e.target.value;
                const results = await ipcRenderer.invoke('perform-search', query);
                const list = document.getElementById('results');
                
                // This makes the heading results work again
                list.innerHTML = results.map(r => `
                    <div class="result" onclick="createTab('${r.title.replace(/'/g, "\\'")}', '${r.href}')">
                        <div style="font-weight:bold; font-size:14px; color:#fff;">${r.title}</div>
                        <div style="font-size:10px; opacity:0.6; color:#aaa;">${r.href}</div>
                    </div>
                `).join('');
            }
        }
        document.getElementById('input').addEventListener('keypress', handleDashboardSearch);

        // 3. Navigation Helper
        function navigateTo(val) {
            if (!val.trim()) return;
            let targetUrl = val;
            if (!val.includes('.') || val.includes(' ')) {
                targetUrl = 'https://duckduckgo.com' + encodeURIComponent(val);
            } else if (!val.startsWith('http')) {
                targetUrl = 'https://' + val;
            }

            if (activeTabId) {
                document.getElementById(activeTabId).src = targetUrl;
            } else {
                createTab('New Tab', targetUrl);
            }
        }

        function createTab(title, url) {
            const id = 'tab-' + (++tabCount);
            
            const tabBtn = document.createElement('div');
            tabBtn.className = 'tab';
            tabBtn.id = 'btn-' + id;
            tabBtn.innerHTML = `<span>${title.substring(0,10)}</span><span class="tab-close" onclick="closeTab(event, '${id}')">×</span>`;
            tabBtn.onclick = () => switchTab(id);
            document.getElementById('tabs-list').appendChild(tabBtn);

            const view = document.createElement('webview');
            view.id = id;
            view.src = url;
            view.style.cssText = "width:100%; height:100%; display:none; background:white; border:none;";
            view.setAttribute('useragent', 'Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/122.0.0.0 Safari/537.36');

            view.addEventListener('did-start-loading', () => { if(activeTabId === id) document.getElementById('main-spinner').style.display = 'block'; });
            view.addEventListener('did-stop-loading', () => { if(activeTabId === id) document.getElementById('main-spinner').style.display = 'none'; });
            view.addEventListener('did-navigate', (e) => { if(activeTabId === id) document.getElementById('main-url-bar').value = e.url; });

            document.getElementById('views-container').appendChild(view);
            switchTab(id);
        }

        function switchTab(id) {
            activeTabId = id;
            document.getElementById('dashboard').classList.add('hidden');
            document.querySelectorAll('webview').forEach(v => v.style.display = 'none');
            const currentView = document.getElementById(id);
            currentView.style.display = 'flex';
            document.getElementById('main-url-bar').value = currentView.src;
            document.querySelectorAll('.tab').forEach(b => b.classList.remove('active'));
            document.getElementById('btn-' + id).classList.add('active');
        }

        function showSearch() {
            activeTabId = null;
            document.getElementById('main-url-bar').value = '';
            document.getElementById('input').value = '';
            document.getElementById('results').innerHTML = ''; // Clear results for a fresh start
            document.getElementById('dashboard').classList.remove('hidden');
            document.querySelectorAll('webview').forEach(v => v.style.display = 'none');
            document.querySelectorAll('.tab').forEach(b => b.classList.remove('active'));
        }

        function goBack() { if(activeTabId) document.getElementById(activeTabId).goBack(); }
        function goForward() { if(activeTabId) document.getElementById(activeTabId).goForward(); }

        function closeTab(e, id) {
            e.stopPropagation();
            document.getElementById(id).remove();
            document.getElementById('btn-' + id).remove();
            if (document.querySelectorAll('.tab').length === 0) showSearch();
            else switchTab(document.querySelector('webview').id);
        }
    </script>

</body>
</html>
